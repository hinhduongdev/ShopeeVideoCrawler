<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #ee4d2d;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #ee4d2d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 13px;
    }
    button:hover {
      background-color: #d73211;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      text-align: center;
      min-height: 18px;
    }



    #progressWrap {
      display: none;
      margin-top: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      height: 10px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: #ee4d2d;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #progressLabel {
      font-size: 11px;
      color: #888;
      text-align: right;
      margin-top: 2px;
      display: none;
    }
    .info {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>Shopee Aff Video Crawler</h3>
  <div class="info">Mở trang Shopee Affiliate → Product Offer, sau đó nhấn nút bên dưới.</div>
  <button id="startBtn">🎬 Crawl & Tải Video</button>
  <div id="status"></div>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="progressLabel"></div>
  <script src="popup.js"></script>
</body>
</html>
